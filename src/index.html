<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Валидатор кредитных карт</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="validator-container">
    <div class="card-logos">
      <img src="./images/visa.png" alt="Логотип Visa">
      <img src="images/mastercard.png" alt="Логотип MasterCard">
      <img src="images/maestro.png" alt="Логотип Maestro">
      <img src="images/discover.png" alt="Логотип Discover">
      <img src="images/jcb.png" alt="Логотип JCB">
      <img src="images/diners.png" alt="Логотип Diners">
    </div>

    <input type="text" id="card-number" placeholder="1111 1111 1111 1111" >

    <button id="validate-btn">Click to Validate</button>
    <div id="result"></div>
  </div>
  <script src="index.js"></script> 
</body>
</html>
